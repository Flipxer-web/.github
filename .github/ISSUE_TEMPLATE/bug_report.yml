name: Bug report
description: Report a user-facing or operational bug that needs investigation or a fix.
title: "[Bug]: "
body:
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository is primarily affected?
      options:
        - flipxer-web-app
        - flipxer-web-services
        - both
        - other / unsure
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - production
        - staging
        - local / Docker
        - other / unknown
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How severe is the issue right now?
      options:
        - blocker
        - high
        - medium
        - low
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken and who is affected?
      placeholder: Describe the bug in one or two clear sentences.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the shortest reliable path to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include logs, screenshots, request IDs, PR links, or other supporting context.
      render: markdown

  - type: textarea
    id: release-notes
    attributes:
      label: Rollout or mitigation notes
      description: Note feature flags, rollback options, temporary mitigations, or deploy-order concerns.
